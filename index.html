<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennis Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
    canvas { display: block; }

    #game-container {
      width: 100%; height: 100%;
      position: relative;
    }

    /* ---- Overlays (stacked on top of canvas) ---- */
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; display: none;
      pointer-events: none;
    }
    .overlay.active { display: flex; }
    .overlay-clickable { pointer-events: auto; }

    /* ---- Menu ---- */
    #menu-overlay {
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26, 26, 46, 0.92);
    }
    #menu-overlay * { pointer-events: auto; }
    #menu-overlay h1 {
      font-size: 56px; color: #fff; letter-spacing: 8px; margin-bottom: 8px;
    }
    #menu-overlay .subtitle {
      font-size: 16px; color: #888; margin-bottom: 40px;
    }
    .menu-section { margin-bottom: 20px; text-align: center; }
    .menu-section label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; letter-spacing: 2px; }
    .btn-group { display: flex; gap: 12px; justify-content: center; }
    .btn {
      padding: 10px 28px; border: 1px solid #444466; border-radius: 6px;
      background: #16213E; color: #fff; font-size: 14px; font-weight: bold;
      cursor: pointer; transition: all 0.15s;
    }
    .btn:hover { border-color: #E94560; }
    .btn.selected { background: #3A3A5C; border-color: #E94560; border-width: 2px; }
    .btn.accent {
      background: #E94560; border-color: #E94560; font-size: 20px;
      padding: 14px 48px; margin-top: 24px;
    }
    .btn.accent:hover { background: #c73650; }
    .controls-help {
      position: absolute; bottom: 24px; left: 0; right: 0; text-align: center;
      font-size: 12px; color: #666;
    }

    /* ---- HUD ---- */
    #hud-overlay { pointer-events: none; }
    #hud-overlay.active { display: block; }
    #score-box {
      position: absolute; top: 16px; left: 20px;
      background: rgba(22, 33, 62, 0.9); border-radius: 8px; padding: 10px 18px;
      min-width: 200px;
    }
    .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .score-row:last-child { margin-bottom: 0; }
    .score-name { font-size: 15px; color: #fff; font-weight: bold; min-width: 50px; }
    .score-games { font-size: 15px; color: #ccc; min-width: 50px; }
    .score-points { font-size: 17px; color: #E94560; font-weight: bold; min-width: 30px; text-align: right; }
    .serve-indicator { color: #E94560; font-size: 12px; }

    #center-message {
      position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; color: #E94560; font-weight: bold; display: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    #serve-instruction {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      font-size: 15px; color: #ccc; display: none;
    }

    /* Power meter */
    #power-meter-container {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px;
      overflow: hidden; display: none;
    }
    #power-meter-fill {
      height: 100%; width: 0%; border-radius: 6px;
      background: linear-gradient(90deg, #33ff33, #ffff00, #ff3333);
      transition: width 0.05s linear;
    }

    /* ---- Result ---- */
    #result-overlay {
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(26, 26, 46, 0.92);
    }
    #result-overlay * { pointer-events: auto; }
    #result-title {
      font-size: 48px; font-weight: bold; margin-bottom: 32px;
    }
    #result-stats {
      background: rgba(22, 33, 62, 0.9); border-radius: 8px; padding: 20px 32px;
      font-size: 16px; color: #fff; line-height: 2; margin-bottom: 32px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- Menu Overlay -->
    <div id="menu-overlay" class="overlay active overlay-clickable">
      <h1>TENNIS</h1>
      <p class="subtitle">A 3D arcade tennis game</p>

      <div class="menu-section">
        <label>DIFFICULTY</label>
        <div class="btn-group" id="difficulty-group">
          <button class="btn" data-value="easy">EASY</button>
          <button class="btn selected" data-value="medium">MEDIUM</button>
          <button class="btn" data-value="hard">HARD</button>
        </div>
      </div>

      <div class="menu-section">
        <label>SETS</label>
        <div class="btn-group" id="sets-group">
          <button class="btn selected" data-value="1">1</button>
          <button class="btn" data-value="3">3</button>
          <button class="btn" data-value="5">5</button>
        </div>
      </div>

      <button class="btn accent" id="play-btn">PLAY</button>

      <div class="controls-help">
        WASD / Arrows: Move &nbsp;|&nbsp; Space (hold): Charge shot &nbsp;|&nbsp; Space (release): Hit
      </div>
    </div>

    <!-- HUD Overlay -->
    <div id="hud-overlay" class="overlay">
      <div id="score-box">
        <div class="score-row">
          <span class="score-name" id="hud-you-name">YOU</span>
          <span class="score-games" id="hud-you-games">0</span>
          <span class="score-points" id="hud-you-points">0</span>
        </div>
        <div class="score-row">
          <span class="score-name" id="hud-cpu-name">CPU</span>
          <span class="score-games" id="hud-cpu-games">0</span>
          <span class="score-points" id="hud-cpu-points">0</span>
        </div>
      </div>
      <div id="center-message"></div>
      <div id="serve-instruction"></div>
      <div id="power-meter-container">
        <div id="power-meter-fill"></div>
      </div>
    </div>

    <!-- Result Overlay -->
    <div id="result-overlay" class="overlay overlay-clickable">
      <div id="result-title"></div>
      <div id="result-stats"></div>
      <button class="btn accent" id="back-btn">BACK TO MENU</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
